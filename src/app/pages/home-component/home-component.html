<div class="container mx-auto p-6 space-y-8">
    <div class="flex flex-col gap-2">
        <h1 class="text-3xl font-bold tracking-tight">Sensor Dashboard</h1>
        <p class="text-muted-foreground">Monitor and configure your temperature sensors.</p>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        @for (sensor of sensors(); track sensor.id) {
        <app-sensor-card [sensor]="sensor" />
        }
    </div>
</div>
