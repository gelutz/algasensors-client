<hlm-dialog-header>
  <h3 hlmDialogTitle>Sensor Settings</h3>
  <p hlmDialogDescription>
    Configure temperature alarms for {{ sensor().name }}.
  </p>
</hlm-dialog-header>

<div class="py-4 grid gap-4" [formGroup]="form">
  <div class="grid grid-cols-4 items-center gap-4">
    <label hlmLabel for="min-alarm" class="text-right">Min Temp</label>
    <input hlmInput id="min-alarm" type="number" formControlName="minAlarm" class="col-span-3" />
  </div>
  <div class="grid grid-cols-4 items-center gap-4">
    <label hlmLabel for="max-alarm" class="text-right">Max Temp</label>
    <input hlmInput id="max-alarm" type="number" formControlName="maxAlarm" class="col-span-3" />
  </div>
</div>

<hlm-dialog-footer>
  <button hlmBtn variant="outline" (click)="cancel()">Cancel</button>
  <button hlmBtn (click)="save()">Save changes</button>
</hlm-dialog-footer>
